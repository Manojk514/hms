<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Today's Appointments - ITiVAT MED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="doctor_appointments.css" />
</head>

<body>

<!-- HEADER -->
<header class="header">
  <button class="back-btn" onclick="location.href='doctor_dashboard.html'">← Back to Dashboard</button>
  <h1>Today's Appointments</h1>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<!-- FILTER BAR -->
<section class="filter-bar">
  <div class="filter-left">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search by patient name or phone..." 
      class="search-input"
      oninput="filterAppointments()"
    />
    
    <select id="statusFilter" class="filter-select" onchange="filterAppointments()">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="in-progress">In Progress</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>
  
  <div class="filter-right">
    <button class="btn-secondary" onclick="refreshAppointments()">🔄 Refresh</button>
    <button class="btn-primary" onclick="exportToExcel()">📊 Export Excel</button>
  </div>
</section>

<!-- APPOINTMENTS TABLE -->
<section class="table-section">
  <div class="table-header">
    <h2>Appointments List</h2>
    <div class="appointment-count">
      Total: <strong id="totalCount">0</strong> | 
      Pending: <strong id="pendingCount">0</strong> | 
      Completed: <strong id="completedCount">0</strong>
    </div>
  </div>

  <div class="table-container">
    <table class="appointments-table" id="appointmentsTable">
      <thead>
        <tr>
          <th>Time</th>
          <th>Patient Name</th>
          <th>Age</th>
          <th>Gender</th>
          <th>Phone</th>
          <th>Reason for Visit</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="appointmentsBody">
        <!-- Appointments will be loaded here -->
      </tbody>
    </table>
  </div>
</section>

<!-- PATIENT DETAILS MODAL -->
<div class="modal" id="patientModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Patient Details</h3>
      <button class="close-btn" onclick="closePatientModal()">&times;</button>
    </div>
    
    <div class="modal-body" id="modalBody">
      <!-- Patient details will be loaded here -->
    </div>
    
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closePatientModal()">Close</button>
      <button class="btn-primary" onclick="startConsultationFromModal()">Start Consultation</button>
    </div>
  </div>
</div>

<!-- STATUS CHANGE MODAL -->
<div class="modal" id="statusModal">
  <div class="modal-content small">
    <div class="modal-header">
      <h3>Change Appointment Status</h3>
      <button class="close-btn" onclick="closeStatusModal()">&times;</button>
    </div>
    
    <div class="modal-body">
      <p><strong>Patient:</strong> <span id="statusPatientName"></span></p>
      <p><strong>Current Status:</strong> <span id="currentStatus"></span></p>
      
      <div class="form-group">
        <label>New Status:</label>
        <select id="newStatus" class="form-select">
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Remarks (Optional):</label>
        <textarea id="statusRemarks" class="form-textarea" rows="3" placeholder="Add any remarks..."></textarea>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeStatusModal()">Cancel</button>
      <button class="btn-primary" onclick="confirmStatusChange()">Update Status</button>
    </div>
  </div>
</div>

<script src="doctor_appointments.js?v=20260403v2"></script>

</body>
</html>
