<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Doctor Login | ITiVAT MED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="doctor_portal.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="top-header">
      <div class="header-brand">
        <img src="itivat_logo.jpg" alt="ITiVAT MED Logo" />
        <h1>ITiVAT MED</h1>
      </div>
    </header>

    <!-- MAIN SECTION -->
    <section class="main-container">
      <!-- LEFT QUOTE SECTION -->
      <div class="quote-section">
        <p class="quote-text">
          “Wherever the art of Medicine is loved, there is also a love of
          Humanity.”
        </p>

        <div class="quote-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <!-- RIGHT LOGIN CARD -->
      <div class="login-card">
        <h2>Doctor Login</h2>

        <label>Doctor ID</label>
        <input type="text" placeholder="Doctor ID" />

        <label>Password</label>
        <input type="password" placeholder="Password" />

        <button>LOGIN</button>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <div>
        <strong>ITiVAT MED</strong>
        <p>Advanced healthcare with compassion.</p>
      </div>

      <div>
        <strong>Support</strong>
        <p>Emergency: 102</p>
        <p>Ambulance: 108</p>
      </div>

      <div>
        <strong>Contact</strong>
        <p>📞 +91 8688335508</p>
        <p>📍 Hyderabad, India</p>
        <p>📧 company support : admin@itivat.com</p>
      </div>
    </footer>
  </body>
</html>
