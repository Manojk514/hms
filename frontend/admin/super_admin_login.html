<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Super Admin Login - ITiVAT MED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="super_admin_login.css" />
</head>

<body>

<header class="header">
  <div class="header-center">
    <img src="itivat_logo.jpg" class="brand-logo" />
    <h1>ITiVAT MED</h1>
  </div>
</header>

<main class="login-wrapper">
  <div class="login-card">
    <h2>Super Admin Login</h2>

    <form onsubmit="handleLogin(event)">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <div class="demo-info">
      <p><strong>Demo:</strong> superadmin / admin123</p>
      <button type="button" onclick="fillDemo()" class="demo-btn">Use Demo</button>
    </div>

    <p id="error" class="error-text"></p>
  </div>
</main>

<script src="super_admin_login.js"></script>

</body>
</html>
