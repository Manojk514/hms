<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Doctor Login API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login {
            background: #667eea;
            color: white;
            grid-column: 1 / -1;
        }
        .btn-login:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-check {
            background: #10b981;
            color: white;
        }
        .btn-check:hover {
            background: #059669;
        }
        .btn-logout {
            background: #ef4444;
            color: white;
        }
        .btn-logout:hover {
            background: #dc2626;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .success {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            color: #991b1b;
        }
        .info {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            color: #1e40af;
        }
        .result h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 15px;
            font-size: 13px;
        }
        .demo-credentials {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .demo-credentials strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 Doctor Login System</h1>
        <p class="subtitle">Test the login, logout, and session check APIs</p>
        
        <div class="demo-credentials">
            <strong>Demo Credentials:</strong><br>
            Email: doctor@hospital.com<br>
            Password: password123
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="doctor@hospital.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-login">🔐 Login</button>
                <button type="button" class="btn-check" onclick="checkSession()">✓ Check Session</button>
                <button type="button" class="btn-logout" onclick="logout()">🚪 Logout</button>
            </div>
        </form>

        <div id="result"></div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            showResult('info', 'Logging in...');

            try {
                const response = await fetch('login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showResult('success', '✅ Login Successful!', data);
                    
                    // Store in localStorage for frontend use
                    localStorage.setItem('doctorCode', data.data.doctor_code);
                    localStorage.setItem('doctorName', data.data.doctor_name);
                    
                    // Show redirect option
                    setTimeout(() => {
                        if (confirm('Login successful! Redirect to dashboard?')) {
                            window.location.href = '../../../frontend/doctor/doctor_dashboard.html';
                        }
                    }, 1000);
                } else {
                    showResult('error', '❌ Login Failed: ' + data.message, data);
                }

            } catch (error) {
                showResult('error', '❌ Network Error: ' + error.message);
            }
        });

        // Check Session
        async function checkSession() {
            showResult('info', 'Checking session...');

            try {
                const response = await fetch('check_session.php', {
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.logged_in) {
                    showResult('success', '✅ Session Active', data);
                } else {
                    showResult('error', '❌ Not Logged In', data);
                }

            } catch (error) {
                showResult('error', '❌ Network Error: ' + error.message);
            }
        }

        // Logout
        async function logout() {
            showResult('info', 'Logging out...');

            try {
                const response = await fetch('logout.php', {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    showResult('success', '✅ Logout Successful', data);
                    
                    // Clear localStorage
                    localStorage.removeItem('doctorCode');
                    localStorage.removeItem('doctorName');
                } else {
                    showResult('error', '❌ Logout Failed: ' + data.message, data);
                }

            } catch (error) {
                showResult('error', '❌ Network Error: ' + error.message);
            }
        }

        // Show Result
        function showResult(type, message, data = null) {
            let html = `<div class="result ${type}">
                <h3>${message}</h3>`;
            
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            html += '</div>';
            resultDiv.innerHTML = html;
        }

        // Check session on page load
        window.addEventListener('load', () => {
            checkSession();
        });
    </script>
</body>
</html>
